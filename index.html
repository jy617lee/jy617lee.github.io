<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Shift — 교대근무 스케줄 위젯</title>
  <link rel="icon" href="/favicon.ico">
  <meta name="description" content="The Shift — 사내 스케줄 스크린샷 한 장으로 등록하고, 홈·잠금화면 위젯에서 오늘의 근무를 바로 확인하는 교대근무 스케줄 위젯 앱.">
  <style>
    :root { --cream:#F7F4EF; --ink:#1C1B1F; --muted:#7A7065; --accent:#00704A; }
    * { box-sizing:border-box; }
    body {
      margin:0; min-height:100vh; background:var(--cream); color:var(--ink);
      font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",Roboto,sans-serif;
      display:flex; align-items:center; justify-content:center; padding:24px; line-height:1.6;
    }
    .card { width:100%; max-width:560px; }
    .lang-toggle { display:flex; justify-content:flex-end; gap:4px; margin-bottom:18px; }
    .lang-toggle button {
      border:1px solid #E4DED4; background:transparent; color:var(--muted);
      padding:5px 12px; border-radius:10px; font-size:13px; font-weight:600; cursor:pointer;
    }
    .lang-toggle button.active { background:var(--accent); border-color:var(--accent); color:#fff; }
    .app { display:flex; align-items:center; gap:14px; margin-bottom:28px; }
    .badge {
      width:56px; height:56px; border-radius:14px; background:var(--accent);
      display:flex; align-items:center; justify-content:center; color:#fff;
      font-size:30px; font-weight:700; flex:0 0 auto;
    }
    h1 { font-size:24px; margin:0; }
    .tagline { color:var(--muted); margin:2px 0 0; font-size:14px; }
    p { font-size:15px; }
    .cta {
      display:inline-block; margin:18px 0 6px; padding:14px 22px; border-radius:14px;
      background:var(--accent); color:#fff; text-decoration:none; font-weight:600; font-size:15px;
    }
    .cta:hover { opacity:.92; }
    .meta { margin-top:32px; padding-top:20px; border-top:1px solid #E4DED4; color:var(--muted); font-size:14px; }
    .meta a { color:var(--accent); text-decoration:none; }
    .meta a:hover { text-decoration:underline; }
    .row { margin:4px 0; }
  </style>
</head>
<body>
  <main class="card">
    <div class="lang-toggle" role="group" aria-label="Language">
      <button type="button" data-lang="ko">한국어</button>
      <button type="button" data-lang="en">English</button>
    </div>

    <div class="app">
      <div class="badge">+</div>
      <div>
        <h1>The Shift</h1>
        <p class="tagline" data-i18n="tagline">교대근무 스케줄 위젯</p>
      </div>
    </div>

    <p data-i18n="body">
      사내 스케줄 화면을 <strong>스크린샷 한 장</strong>으로 등록하면,
      홈 화면과 잠금화면 <strong>위젯</strong>에서 오늘의 출·퇴근 시간을 바로 확인할 수 있어요.
      주간 미리보기, 근무 카운트다운, 캘린더 자동 추가까지 지원합니다.
    </p>

    <a class="cta" href="https://apps.apple.com/kr/app/the-shift/id6782529001" data-i18n="cta">App Store에서 다운로드</a>

    <div class="meta">
      <div class="row"><a href="/support.html" data-i18n="support">지원 · 문의</a></div>
      <div class="row"><a href="/privacy-policy.html" data-i18n="privacy">개인정보처리방침</a></div>
      <div class="row">Jeeyun Lee</div>
      <div class="row"><a href="mailto:jy617.lee@gmail.com">jy617.lee@gmail.com</a></div>
    </div>
  </main>

  <script>
    // 국문/영문 전환 — 기본은 사용자 브라우저 언어, 선택은 localStorage에 기억.
    var STRINGS = {
      ko: {
        title: "The Shift — 교대근무 스케줄 위젯",
        tagline: "교대근무 스케줄 위젯",
        body: "사내 스케줄 화면을 <strong>스크린샷 한 장</strong>으로 등록하면, 홈 화면과 잠금화면 <strong>위젯</strong>에서 오늘의 출·퇴근 시간을 바로 확인할 수 있어요. 주간 미리보기, 근무 카운트다운, 캘린더 자동 추가까지 지원합니다.",
        cta: "App Store에서 다운로드",
        support: "지원 · 문의",
        privacy: "개인정보처리방침"
      },
      en: {
        title: "The Shift — Shift Work Schedule Widget",
        tagline: "Shift work schedule widget",
        body: "Add your work schedule with <strong>a single screenshot</strong> and see today's shift right on your <strong>home and lock screen widgets</strong>. Weekly preview, shift countdown, and automatic calendar sync included.",
        cta: "Download on the App Store",
        support: "Support",
        privacy: "Privacy Policy"
      }
    };
    function applyLang(lang) {
      var t = STRINGS[lang] || STRINGS.ko;
      document.documentElement.lang = lang;
      document.title = t.title;
      document.querySelectorAll("[data-i18n]").forEach(function (el) {
        var key = el.getAttribute("data-i18n");
        if (t[key]) { el.innerHTML = t[key]; }
      });
      document.querySelectorAll(".lang-toggle button").forEach(function (btn) {
        btn.classList.toggle("active", btn.getAttribute("data-lang") === lang);
      });
      try { localStorage.setItem("shift-lang", lang); } catch (e) {}
    }
    function initialLang() {
      try {
        var saved = localStorage.getItem("shift-lang");
        if (saved === "ko" || saved === "en") { return saved; }
      } catch (e) {}
      var nav = (navigator.language || "en").toLowerCase();
      return nav.indexOf("ko") === 0 ? "ko" : "en";
    }
    document.querySelectorAll(".lang-toggle button").forEach(function (btn) {
      btn.addEventListener("click", function () { applyLang(btn.getAttribute("data-lang")); });
    });
    applyLang(initialLang());
  </script>
</body>
</html>
